<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0f172a" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />
  <meta name="apple-mobile-web-app-title" content="UniInspect" />
  <title>UniInspect — Vehicle Inspection</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛡️</text></svg>" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #f1f5f9; font-family: 'Inter', 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
    #root { min-height: 100vh; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    @keyframes load  { 0%{width:10%} 50%{width:80%} 100%{width:10%} }
    .splash {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; min-height: 100vh;
      background: #0f172a; color: #f1f5f9; gap: 12px;
    }
    .splash-icon  { font-size: 56px; }
    .splash-title { font-size: 26px; font-weight: 800; letter-spacing: -0.5px; }
    .splash-sub   { font-size: 13px; color: #64748b; }
    .splash-bar   { width: 140px; height: 4px; background: #1e293b; border-radius: 4px; overflow: hidden; margin-top: 10px; }
    .splash-fill  { height: 100%; background: linear-gradient(90deg,#3b82f6,#06b6d4); border-radius: 4px; animation: load 1.6s ease-in-out infinite; }
  </style>
</head>
<body>
  <div id="root">
    <div class="splash">
      <div class="splash-icon">🛡️</div>
      <div class="splash-title">UniInspect</div>
      <div class="splash-sub">Loading…</div>
      <div class="splash-bar"><div class="splash-fill"></div></div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <script type="text/babel" src="app.js"></script>
</body>
</html>
